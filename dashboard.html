<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>한상경 후보 설문조사 대시보드</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ============================================================
       CSS 변수
       ============================================================ */
    :root {
      --navy:    #1E3A8A;
      --navy-dk: #163080;
      --cream:   #F4F1E0;
      --sage:    #DBDDBA;
      --mint:    #A8E1C2;
      --yellow:  #E1DB00;
      --green:   #CBE0A0;
      --white:   #FFFFFF;
      --text:    #111827;
      --mid:     #374151;
      --light:   #6B7280;

      --radius:  8px;       /* 카드 기본 라운드 */
      --radius-sm: 5px;
      --shadow:  0 2px 12px rgba(0,0,0,0.07);
      --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
    }

    /* ============================================================
       리셋 & 기본
       ============================================================ */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ============================================================
       레이아웃
       ============================================================ */
    .wrap {
      max-width: 1320px;
      margin: 0 auto;
      padding: 24px 20px 48px;
    }

    /* ============================================================
       헤더
       ============================================================ */
    .dash-header {
      background: var(--navy);
      border-radius: var(--radius);
      padding: 28px 32px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .dash-header-left { display:flex; align-items:center; gap:16px; }

    .dash-logo-mark {
      width: 44px; height: 44px;
      border-radius: var(--radius-sm);
      background: var(--yellow);
      display: flex; align-items:center; justify-content:center;
      font-family: 'Noto Serif KR', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--navy);
      flex-shrink: 0;
    }

    .dash-title {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1.05rem, 2.5vw, 1.4rem);
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }

    .dash-subtitle {
      font-size: 0.78rem;
      color: var(--mint);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }

    /* ============================================================
       상태 바
       ============================================================ */
    .status-bar {
      background: var(--white);
      border: 1px solid var(--sage);
      border-radius: var(--radius);
      padding: 12px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      animation: blink 2s infinite;
    }
    .status-dot.loading { background: #E8A020; }
    .status-dot.success { background: #2D8A5A; }
    .status-dot.error   { background: #C0392B; }

    @keyframes blink {
      0%, 100% { opacity:1; }
      50%       { opacity:0.4; }
    }

    .status-text {
      flex: 1;
      font-size: 0.88rem;
      color: var(--mid);
      font-weight: 500;
      min-width: 0;
    }

    .btn-refresh {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 7px 18px;
      border: 2px solid var(--navy);
      border-radius: var(--radius-sm);
      background: transparent;
      color: var(--navy);
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
    }
    .btn-refresh:hover {
      background: var(--navy);
      color: #fff;
    }

    /* ============================================================
       KPI 카드
       ============================================================ */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .kpi-card {
      background: var(--white);
      border: 1px solid var(--sage);
      border-radius: var(--radius);
      padding: 22px 20px;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--navy);
    }
    .kpi-card:nth-child(2)::before { background: var(--mint); }
    .kpi-card:nth-child(3)::before { background: var(--yellow); }
    .kpi-card:nth-child(4)::before { background: var(--green); }

    .kpi-label {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--light);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      font-weight: 700;
      color: var(--navy);
      line-height: 1.1;
    }

    /* ============================================================
       차트 그리드
       ============================================================ */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .chart-card {
      background: var(--white);
      border: 1px solid var(--sage);
      border-radius: var(--radius);
      padding: 24px;
    }

    .chart-header {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--cream);
    }

    .chart-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--navy);
    }

    .chart-sub {
      font-size: 0.72rem;
      color: var(--light);
    }

    /* ============================================================
       테이블
       ============================================================ */
    .table-card {
      background: var(--white);
      border: 1px solid var(--sage);
      border-radius: var(--radius);
      padding: 24px;
      overflow-x: auto;
      margin-bottom: 20px;
    }

    .table-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--cream);
      flex-wrap: wrap;
      gap: 8px;
    }

    .table-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--navy);
    }

    .table-badge {
      font-size: 0.72rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 100px;
      background: var(--cream);
      color: var(--mid);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 600px;
    }

    thead th {
      background: var(--navy);
      color: #fff;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 10px 14px;
      text-align: left;
      white-space: nowrap;
    }
    thead th:first-child { border-radius: var(--radius-sm) 0 0 var(--radius-sm); }
    thead th:last-child  { border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }

    tbody td {
      font-size: 0.85rem;
      color: var(--mid);
      padding: 10px 14px;
      border-bottom: 1px solid var(--cream);
      white-space: nowrap;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    tbody tr:hover td { background: var(--cream); }
    tbody tr:last-child td { border-bottom: none; }

    /* ============================================================
       에러 / 초기화 패널
       ============================================================ */
    .msg-panel {
      background: var(--white);
      border: 1px solid var(--sage);
      border-radius: var(--radius);
      padding: 48px 32px;
      text-align: center;
    }

    .msg-icon  { font-size: 2.8rem; margin-bottom: 14px; }
    .msg-title {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 10px;
    }
    .msg-body {
      font-size: 0.9rem;
      color: var(--light);
      line-height: 1.8;
      margin-bottom: 20px;
    }

    .code-block {
      background: var(--cream);
      border: 1px solid var(--sage);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 0.82rem;
      color: var(--navy);
      text-align: left;
      margin: 16px auto;
      max-width: 560px;
      word-break: break-all;
    }

    .checklist {
      text-align: left;
      max-width: 400px;
      margin: 0 auto 24px;
      background: var(--cream);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
    }
    .checklist li {
      font-size: 0.85rem;
      color: var(--mid);
      padding: 4px 0 4px 18px;
      position: relative;
      list-style: none;
    }
    .checklist li::before {
      content: '·';
      position: absolute;
      left: 6px;
      font-size: 1.1rem;
      color: var(--navy);
    }

    .btn-primary {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      padding: 11px 28px;
      background: var(--navy);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-primary:hover { background: var(--navy-dk); }

    /* ============================================================
       반응형
       ============================================================ */
    @media (max-width: 960px) {
      .kpi-grid   { grid-template-columns: repeat(2, 1fr); }
      .charts-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .wrap { padding: 16px 14px 36px; }
      .dash-header { padding: 20px 18px; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .kpi-card { padding: 16px 14px; }
      .chart-card, .table-card { padding: 16px; }
      .kpi-value { font-size: 1.5rem; }
    }

    @media (max-width: 400px) {
      .kpi-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ── 헤더 ── -->
  <header class="dash-header">
    <div class="dash-header-left">
      <div class="dash-logo-mark">한</div>
      <div>
        <div class="dash-title">한상경 충남교육감 예비후보</div>
        <div class="dash-subtitle">실시간 설문조사 대시보드</div>
      </div>
    </div>
    <a href="index.html" style="font-size:0.8rem; color:rgba(255,255,255,0.5); text-decoration:none;">← 메인 페이지</a>
  </header>

  <!-- ── 상태 바 ── -->
  <div class="status-bar">
    <div class="status-dot loading" id="statusIndicator"></div>
    <div class="status-text"  id="statusText">초기화 중...</div>
    <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
  </div>

  <!-- ── 대시보드 콘텐츠 (JS 렌더링) ── -->
  <div id="dashboardContent"></div>

</div><!-- /wrap -->

<script>
  /* ============================================================
     API 설정
     ============================================================ */
  let API_URL = localStorage.getItem('apiUrl') ||
    'https://script.google.com/macros/s/AKfycbzl6EDqI1HwFcXVRL80L7FF7o4wCxvAquK7k95SAvK9R7LOmHv-KgDsBhfTBUU3lBUFDQ/exec';

  let charts = {};
  let isLoading = false;

  /* ── 차트 공통 팔레트 ── */
  const PALETTE = ['#1E3A8A','#A8E1C2','#E1DB00','#CBE0A0','#DBDDBA','#6B7280','#C8A800'];

  window.addEventListener('load', () => {
    if (!API_URL) { showSetupRequired(); }
    else {
      loadData();
      setInterval(() => loadData(), 30000);
    }
  });

  /* ── 상태 표시 ── */
  function updateStatus(text, type = 'loading') {
    document.getElementById('statusIndicator').className = `status-dot ${type}`;
    document.getElementById('statusText').textContent = text;
  }

  /* ── API 없을 때 안내 ── */
  function showSetupRequired() {
    updateStatus('API URL 설정이 필요합니다', 'error');
    document.getElementById('dashboardContent').innerHTML = `
      <div class="msg-panel">
        <div class="msg-icon">⚙️</div>
        <div class="msg-title">초기 설정이 필요합니다</div>
        <div class="msg-body">
          Apps Script 웹 앱 URL이 설정되지 않았습니다.<br />
          브라우저 콘솔(F12)에서 아래 명령어를 실행하세요.
        </div>
        <div class="code-block">localStorage.setItem('apiUrl', 'YOUR_APPS_SCRIPT_URL_HERE');</div>
        <div class="msg-body" style="font-size:0.82rem">YOUR_APPS_SCRIPT_URL_HERE 부분을 실제 Apps Script URL로 교체하세요.</div>
        <button class="btn-primary" onclick="location.reload()">페이지 새로고침</button>
      </div>`;
  }

  /* ── 데이터 로드 ── */
  async function loadData() {
    if (isLoading) return;
    if (!API_URL) { showSetupRequired(); return; }

    isLoading = true;
    updateStatus('데이터를 불러오는 중...', 'loading');

    try {
      const res    = await fetch(API_URL, { method: 'GET', redirect: 'follow' });
      if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);

      const result = await res.json();
      if (result.status === 'error') throw new Error(result.message);
      if (!result.data || !result.data.length)
        throw new Error('구글 시트에 데이터가 없습니다. 헤더와 최소 1개의 응답이 필요합니다.');

      processData(result.data);
      updateStatus(`✓ 연결 성공 — ${result.count}개 응답 · ${new Date().toLocaleTimeString('ko-KR')}`, 'success');

    } catch (err) {
      updateStatus(`오류: ${err.message}`, 'error');
      showError(err.message);
    } finally {
      isLoading = false;
    }
  }

  /* ── 데이터 처리 & HTML 주입 ── */
  function processData(data) {
    document.getElementById('dashboardContent').innerHTML = `

      <!-- KPI 카드 -->
      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">총 응답 수</div>
          <div class="kpi-value" id="totalResponses">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">평균 지지도</div>
          <div class="kpi-value" id="avgSupport">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">적극 지지</div>
          <div class="kpi-value" id="strongSupport">—</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">최다 응답 지역</div>
          <div class="kpi-value" id="topRegion" style="font-size:1.45rem">—</div>
        </div>
      </div>

      <!-- 차트 2×2 -->
      <div class="charts-grid">
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">지지도 분포</div>
            <div class="chart-sub">전체 응답</div>
          </div>
          <canvas id="supportChart"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">연령대별 응답</div>
            <div class="chart-sub">세대별 현황</div>
          </div>
          <canvas id="ageChart"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">지역별 응답</div>
            <div class="chart-sub">충남 시·군별</div>
          </div>
          <canvas id="regionChart"></canvas>
        </div>
        <div class="chart-card">
          <div class="chart-header">
            <div class="chart-title">시급한 교육 문제</div>
            <div class="chart-sub">도민 인식 (복수 응답)</div>
          </div>
          <canvas id="issueChart"></canvas>
        </div>
      </div>

      <!-- 최근 응답 테이블 -->
      <div class="table-card">
        <div class="table-header">
          <div class="table-title">최근 응답 데이터</div>
          <span class="table-badge">최신 20건</span>
        </div>
        <table>
          <thead>
            <tr>
              <th>제출시간</th>
              <th>성명</th>
              <th>연령대</th>
              <th>지역</th>
              <th>지지도</th>
              <th>중요 공약</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>`;

    updateStats(data);
    drawCharts(data);
    updateTable(data);
  }

  /* ── KPI 업데이트 ── */
  function updateStats(data) {
    document.getElementById('totalResponses').textContent = data.length;

    const supportKey = Object.keys(data[0]).find(k => k.includes('지지') || k.toLowerCase().includes('support'));

    const supportCounts = {};
    data.forEach(r => {
      const s = (r[supportKey] || '').trim();
      if (s) supportCounts[s] = (supportCounts[s] || 0) + 1;
    });

    const strongCount = Object.keys(supportCounts).reduce((sum, k) =>
      (k.includes('매우') || k.includes('적극')) ? sum + supportCounts[k] : sum, 0);

    document.getElementById('strongSupport').textContent =
      Math.round((strongCount / data.length) * 100) + '%';

    const scores = { '매우 지지함':5,'적극 지지':5,'지지':4,'약간 지지':4,'보통':3,'지지하지 않음':2,'전혀 지지하지 않음':1 };
    const avgPct  = Math.round((data.reduce((s,r) => s + (scores[r[supportKey]] || 3), 0) / data.length / 5) * 100);
    document.getElementById('avgSupport').textContent = avgPct + '%';

    const regionKey = Object.keys(data[0]).find(k => k.includes('지역') || k.toLowerCase().includes('region'));
    const regionCounts = {};
    data.forEach(r => { const v=(r[regionKey]||'').trim(); if(v) regionCounts[v]=(regionCounts[v]||0)+1; });
    const topRegion = Object.keys(regionCounts).reduce((a,b) => regionCounts[a]>regionCounts[b]?a:b, '-');
    document.getElementById('topRegion').textContent = topRegion;
  }

  /* ── 차트 공통 옵션 ── */
  const commonFont = {
    family: "'Noto Sans KR', sans-serif",
    size: 11,
  };
  Chart.defaults.font = commonFont;
  Chart.defaults.color = '#6B7280';

  /* ── 차트 그리기 ── */
  function drawCharts(data) {
    const key = f => Object.keys(data[0]).find(k => f(k));
    const count = (arr) => {
      const o = {};
      arr.forEach(v => { v = v.trim(); if(v) o[v]=(o[v]||0)+1; });
      return o;
    };

    /* 지지도 — 도넛 */
    const sCounts = count(data.map(r => r[key(k => k.includes('지지')||k.toLowerCase().includes('support'))] || ''));
    if (charts.support) charts.support.destroy();
    charts.support = new Chart(document.getElementById('supportChart'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(sCounts),
        datasets: [{ data: Object.values(sCounts), backgroundColor: PALETTE, borderWidth: 0 }]
      },
      options: {
        responsive: true,
        cutout: '60%',
        plugins: {
          legend: { position: 'bottom', labels: { padding: 14, boxWidth: 12, font: commonFont } }
        }
      }
    });

    /* 연령대 — 세로 막대 */
    const aCounts = count(data.map(r => r[key(k => k.includes('연령')||k.toLowerCase().includes('age'))] || ''));
    if (charts.age) charts.age.destroy();
    charts.age = new Chart(document.getElementById('ageChart'), {
      type: 'bar',
      data: {
        labels: Object.keys(aCounts),
        datasets: [{ label: '응답 수', data: Object.values(aCounts), backgroundColor: '#1E3A8A', borderRadius: 4, borderSkipped: false }]
      },
      options: {
        responsive: true,
        scales: {
          y: { beginAtZero: true, grid: { color: '#F4F1E0' }, ticks: { font: commonFont } },
          x: { grid: { display: false }, ticks: { font: commonFont } }
        },
        plugins: { legend: { display: false } }
      }
    });

    /* 지역 — 가로 막대 */
    const rCounts = count(data.map(r => r[key(k => k.includes('지역')||k.toLowerCase().includes('region'))] || ''));
    const rSorted = Object.entries(rCounts).sort((a,b) => b[1]-a[1]);
    if (charts.region) charts.region.destroy();
    charts.region = new Chart(document.getElementById('regionChart'), {
      type: 'bar',
      data: {
        labels: rSorted.map(e=>e[0]),
        datasets: [{ label: '응답 수', data: rSorted.map(e=>e[1]), backgroundColor: '#A8E1C2', borderRadius: 4, borderSkipped: false }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        scales: {
          x: { beginAtZero: true, grid: { color: '#F4F1E0' }, ticks: { font: commonFont } },
          y: { grid: { display: false }, ticks: { font: commonFont } }
        },
        plugins: { legend: { display: false } }
      }
    });

    /* 시급 문제 — 가로 막대 */
    const issueKey = key(k => k.includes('시급')||k.includes('문제'));
    const issueArr = [];
    data.forEach(r => (r[issueKey]||'').split(',').forEach(v => issueArr.push(v.trim())));
    const iCounts = count(issueArr);
    const iSorted = Object.entries(iCounts).sort((a,b) => b[1]-a[1]);
    if (charts.issue) charts.issue.destroy();
    charts.issue = new Chart(document.getElementById('issueChart'), {
      type: 'bar',
      data: {
        labels: iSorted.map(e=>e[0]),
        datasets: [{ label: '선택 횟수', data: iSorted.map(e=>e[1]), backgroundColor: '#C8A800', borderRadius: 4, borderSkipped: false }]
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        scales: {
          x: { beginAtZero: true, grid: { color: '#F4F1E0' }, ticks: { font: commonFont } },
          y: { grid: { display: false }, ticks: { font: { ...commonFont, size: 10 } } }
        },
        plugins: { legend: { display: false } }
      }
    });
  }

  /* ── 테이블 업데이트 ── */
  function updateTable(data) {
    const tbody  = document.getElementById('tableBody');
    tbody.innerHTML = '';
    const recent = data.slice(-20).reverse();

    const k = f => Object.keys(data[0]).find(f);
    const timeKey    = Object.keys(data[0])[0];
    const nameKey    = k(k => k.includes('성명')||k.includes('이름')||k.includes('성함'));
    const ageKey     = k(k => k.includes('연령'));
    const regionKey  = k(k => k.includes('지역'));
    const supportKey = k(k => k.includes('지지'));
    const policyKey  = k(k => k.includes('공약'));

    // 이름 마스킹 함수
    function maskName(name) {
  if (!name || name === '—') return name;
  name = name.trim();
  
  // 이름이 한 글자 이상인 경우
  if (name.length > 0) {
    // 첫 번째 글자(성) + 나머지 글자 수만큼 '*' 반복
    return name[0] + '*'.repeat(name.length - 1);
  }
  
  return name;
}

    recent.forEach(row => {
      let name = maskName(row[nameKey] || '—');
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${row[timeKey]||'—'}</td>
        <td>${name}</td>
        <td>${row[ageKey]||'—'}</td>
        <td>${row[regionKey]||'—'}</td>
        <td>${row[supportKey]||'—'}</td>
        <td>${row[policyKey]||'—'}</td>`;
      tbody.appendChild(tr);
    });
  }
  

  /* ── 오류 패널 ── */
  function showError(message) {
    document.getElementById('dashboardContent').innerHTML = `
      <div class="msg-panel">
        <div class="msg-icon">⚠️</div>
        <div class="msg-title">데이터 로드 실패</div>
        <div class="msg-body">${message}</div>
        <ul class="checklist">
          <li>Apps Script가 올바르게 배포되었는지 확인</li>
          <li>액세스 권한이 "모든 사용자"로 설정되었는지 확인</li>
          <li>구글 시트에 헤더 + 최소 1개의 응답이 있는지 확인</li>
          <li>시트 이름이 "설문조사_결과"인지 확인</li>
        </ul>
        <button class="btn-primary" onclick="loadData()">↻ 다시 시도</button>
      </div>`;
  }

  /* ── 콘솔 유틸리티 ── */
  window.setApiUrl   = url => { localStorage.setItem('apiUrl', url); API_URL = url; location.reload(); };
  window.getApiUrl   = ()  => console.log('API URL:', localStorage.getItem('apiUrl'));
  window.clearApiUrl = ()  => { localStorage.removeItem('apiUrl'); location.reload(); };

  console.log('💡 setApiUrl("URL") / getApiUrl() / clearApiUrl()');
</script>
</body>
